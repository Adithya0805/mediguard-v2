name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ── JOB 1: Backend Verification ─────────────────────────────────────────────
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache Pip Packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run Ruff Linter
      run: ruff check app/ || true

    - name: Run Mypy Type Checker
      run: mypy app/ --ignore-missing-imports || true

    - name: Run Unit Tests (Collect Only)
      run: pytest tests/ -v --tb=short --co

    - name: Run Clinical Safety Evaluation Pipeline (Mock Mode)
      run: python evals/run_eval.py --use-mock


  # ── JOB 2: Frontend Verification ────────────────────────────────────────────
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'

    - name: Install Frontend Dependencies
      run: npm install

    - name: Run Next.js Type Check
      run: npm run type-check || true

    - name: Compile Next.js Build
      run: npm run build
      env:
        NEXT_PUBLIC_API_URL: https://mediguard-v2.onrender.com
        NEXT_PUBLIC_APP_NAME: "MediGuard V2"
        NEXT_PUBLIC_ENVIRONMENT: production

  # ── JOB 3: Deploy Backend to Render ────────────────────────────────────────
  deploy-backend:
    needs: [backend-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
    - name: Trigger Render Production Deploy
      run: |
        if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
          echo "Triggering Render deploy hook..."
          curl -sS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
        else
          echo "RENDER_DEPLOY_HOOK_URL secret is not set. Skipping manual hook trigger since Render auto-deploy is active."
        fi



  # ── JOB 4: Deploy Frontend to Vercel ────────────────────────────────────────
  deploy-frontend:
    needs: [frontend-build, deploy-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Vercel CLI
      run: npm install -g vercel@latest

    - name: Link Vercel Project Dynamically
      run: |
        mkdir -p .vercel
        echo '{"projectId":"${{ secrets.VERCEL_PROJECT_ID }}","orgId":"${{ secrets.VERCEL_ORG_ID }}","projectName":"mediguard-v2"}' > .vercel/project.json

    - name: Deploy Frontend Next.js app to Vercel
      run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
      env:
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
