name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ── JOB 1: Backend Verification ─────────────────────────────────────────────
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache Pip Packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run Ruff Linter
      run: ruff check app/

    - name: Run Mypy Type Checker
      run: mypy app/ --ignore-missing-imports

    - name: Run Unit Tests (Collect Only)
      run: pytest tests/ -v --tb=short --co

  # ── JOB 2: Frontend Verification ────────────────────────────────────────────
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'

    - name: Install Frontend Dependencies
      run: npm install

    - name: Run Next.js Type Check
      run: npm run type-check

    - name: Compile Next.js Build
      run: npm run build
      env:
        NEXT_PUBLIC_API_URL: https://mediguard-backend.up.railway.app
        NEXT_PUBLIC_APP_NAME: "MediGuard V2"
        NEXT_PUBLIC_ENVIRONMENT: production

  # ── JOB 3: Deploy Backend to Railway ───────────────────────────────────────
  deploy-backend:
    needs: [backend-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Railway CLI
      run: npm install -g @railway/cli

    - name: Trigger Railway Production Deploy
      run: railway up --detach
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    - name: Wait for Staging Container Warmup
      run: sleep 30

    - name: Execute Backend Container Health Check
      run: |
        curl -f -s -S -o /dev/null -w "%{http_code}" https://mediguard-backend.up.railway.app/health | grep "200"

  # ── JOB 4: Deploy Frontend to Vercel ────────────────────────────────────────
  deploy-frontend:
    needs: [frontend-build, deploy-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Vercel CLI
      run: npm install -g vercel@latest

    - name: Deploy Frontend Next.js app to Vercel
      run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
      env:
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
